<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>My Expenses</h1>
            <div class="stats">
                <div class="stat-card">
                    <span class="label">Total Expenses</span>
                    <span id="total-amount" class="value">$0.00</span>
                </div>
            </div>
        </header>

        <main>
            <section class="add-expense">
                <h2>Add New Expense</h2>
                <form id="expense-form">
                    <div class="form-group">
                        <input type="text" id="name" placeholder="Name (e.g. Lunch)" required>
                    </div>
                    <div class="form-group">
                        <input type="number" id="amount" placeholder="Amount (0.00)" required step="0.01">
                    </div>
                    <div class="form-group">
                        <select id="category" required style="width: 100%; padding: 0.625rem; border-radius: 0.5rem; border: 1px solid var(--border-color);">
                            <option value="Food">Food</option>
                            <option value="Transport">Transport</option>
                            <option value="Bills">Bills</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <select id="type" required style="width: 100%; padding: 0.625rem; border-radius: 0.5rem; border: 1px solid var(--border-color);">
                            <option value="Expense">Expense</option>
                            <option value="Income">Income</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary">Add</button>
                </form>
            </section>

            <section class="expense-list-container">
                <div class="list-header">
                    <h2>Recent Transactions</h2>
                    <button id="refresh-btn" class="btn-secondary">Refresh</button>
                </div>
                <div class="table-responsive">
                    <table id="expense-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Details</th>
                                <th>Amount</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="expense-list">
                            <!-- Expenses will be injected here -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
